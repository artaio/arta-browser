# Runs on pushes to main: semantic-release computes the next version from
# Conventional Commits, updates the CHANGELOG, publishes to npm via OIDC
# (trusted publishing), tags the release, and commits the version bump back.

name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: publish-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        registry-url: 'https://registry.npmjs.org'

    # OIDC trusted publishing requires npm >= 11.5.1
    - name: Update npm
      run: npm install -g npm@latest

    - name: Install dependencies
      run: npm install

    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release
